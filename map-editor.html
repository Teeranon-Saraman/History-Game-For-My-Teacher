<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>History Map Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root {
    --bg: #120904;
    --panel: #1b0d05;
    --panel-2: #251306;
    --rim: #8b5a1a;
    --rim-soft: #4d2c10;
    --gold: #ffd166;
    --text: #f3dfb5;
    --muted: #b8955a;
    --green: #1e5c14;
  }
  html, body {
    width: 100%;
    min-height: 100%;
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: grid;
    grid-template-rows: auto minmax(0, 1fr);
    overflow: hidden;
  }
  button, select, input {
    font: inherit;
    color: var(--text);
    background: #0f0703;
    border: 1px solid var(--rim);
    border-radius: 6px;
  }
  button {
    min-height: 36px;
    padding: 8px 12px;
    cursor: pointer;
    font-weight: 800;
  }
  button:hover { border-color: var(--gold); }
  button.active {
    background: var(--green);
    border-color: #58b65f;
    color: #d8ffd2;
  }
  a {
    color: var(--gold);
    text-decoration: none;
  }
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-height: 58px;
    padding: 10px 14px;
    border-bottom: 2px solid var(--rim-soft);
    background: #160903;
  }
  #title {
    min-width: 180px;
    color: var(--gold);
    font-size: 18px;
    font-weight: 900;
  }
  #tools {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  #actions {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    min-width: 260px;
  }
  #actions button.primary {
    background: var(--green);
    border-color: #58b65f;
    color: #d8ffd2;
  }
  #app {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 330px;
    min-height: 0;
  }
  #stage {
    position: relative;
    min-width: 0;
    min-height: 0;
    display: grid;
    place-items: center;
    padding: 14px;
    overflow: auto;
    background:
      linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px),
      linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
      #090403;
    background-size: 24px 24px;
  }
  #mapCanvas {
    width: min(100%, 960px);
    height: auto;
    aspect-ratio: 4 / 3;
    image-rendering: pixelated;
    background: #050302;
    border: 2px solid var(--rim);
    box-shadow: 0 18px 48px rgba(0,0,0,.55);
    cursor: crosshair;
  }
  #side {
    min-height: 0;
    overflow: auto;
    border-left: 2px solid var(--rim-soft);
    background: var(--panel);
    padding: 14px;
  }
  .side-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .side-row button {
    width: 100%;
  }
  .section-title {
    margin: 12px 0 8px;
    color: var(--gold);
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
  }
  #palette {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .tile-btn {
    display: grid;
    grid-template-columns: 34px minmax(0, 1fr);
    align-items: center;
    gap: 8px;
    min-height: 46px;
    padding: 6px;
    text-align: left;
  }
  .tile-btn canvas {
    width: 34px;
    height: 34px;
    image-rendering: pixelated;
    border: 1px solid rgba(255,255,255,.14);
    background: #120904;
  }
  .tile-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
    font-size: 12px;
    font-weight: 800;
  }
  .field {
    display: grid;
    gap: 5px;
    margin-bottom: 10px;
  }
  .field label {
    color: var(--muted);
    font-size: 12px;
    font-weight: 800;
  }
  .field input {
    width: 100%;
    min-height: 36px;
    padding: 8px 10px;
  }
  #status {
    min-height: 46px;
    margin-top: 12px;
    padding: 10px;
    overflow-wrap: anywhere;
    color: var(--muted);
    border: 1px solid var(--rim-soft);
    border-radius: 6px;
    background: rgba(255,255,255,.035);
    font-size: 13px;
    line-height: 1.35;
  }
  #status.good { color: #c9f2bd; }
  #status.bad { color: #ffb3b3; }
  .mini {
    color: var(--muted);
    font-size: 12px;
    line-height: 1.45;
  }
  @media (max-width: 900px) {
    body { overflow: auto; }
    #topbar, #actions, #tools {
      align-items: stretch;
      flex-direction: column;
    }
    #actions, #title {
      width: 100%;
      min-width: 0;
    }
    #app {
      grid-template-columns: 1fr;
    }
    #side {
      border-left: 0;
      border-top: 2px solid var(--rim-soft);
    }
  }
</style>
</head>
<body>
  <header id="topbar">
    <div id="title">Map Editor</div>
    <div id="tools" role="group" aria-label="Editor tools">
      <button id="tool-tile" class="active" data-tool="tile">Tiles</button>
      <button id="tool-dig" data-tool="dig">Dig</button>
      <button id="tool-npc" data-tool="npc">NPC</button>
      <button id="tool-start" data-tool="start">Start</button>
    </div>
  <div id="actions">
      <button id="undo">Undo</button>
      <button id="rotate">Rotate 0°</button>
      <button id="save" class="primary">Save Map</button>
      <button id="download">Download JSON</button>
      <a href="index.html">Back To Game</a>
    </div>
  </header>

  <main id="app">
    <section id="stage">
      <canvas id="mapCanvas" width="960" height="720"></canvas>
    </section>

    <aside id="side">
      <div class="section-title">Map</div>
      <div class="side-row">
        <button id="fill-soil">Fill Soil</button>
        <button id="randomize">Generate</button>
      </div>
      <div class="side-row">
        <button id="border-fence">Border Fence</button>
        <button id="clear-dig">Clear Dig</button>
      </div>
      <div class="side-row">
        <button id="rotate-side">Rotate Selection</button>
        <button id="undo-side">Undo</button>
      </div>
      <div class="field">
        <label for="map-name">File</label>
        <input id="map-name" value="map.json">
      </div>
      <div id="stats" class="mini"></div>

      <div class="section-title">Palette</div>
      <div id="palette"></div>
      <div id="status">Loading map...</div>
    </aside>
  </main>

  <script src="map-edit.js"></script>
</body>
</html>
